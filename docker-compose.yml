services:
  server:
    build: .
    ports:
      - "3030:3030"
    volumes:
      - ./data:/app/data
    environment:
      - DEBUG=${DEBUG:-true}
      - PORT=${PORT:-3030}

      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_MODEL=${LLM_MODEL:-llama3.1}
      - LLM_URL=${LLM_URL:-http://ollama:11434}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE}

      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - NATS_USER=${NATS_USER:-nats}
      - NATS_PASSWORD=${NATS_PASSWORD:-nats}

      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.12.0
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./pull-medical-llm.sh:/entrypoint.sh
    restart: unless-stopped
    entrypoint: ["/usr/bin/bash", "/entrypoint.sh"]
    environment:
      - MODEL_NAME=${LLM_MODEL:-llama3.1}

  nats:
    image: nats:2.12.1
    ports:
      - "4222:4222" # client connections
      - "8222:8222" # monitoring http (server stats)
    # Enable JetStream and persist its store to a Docker volume. Credentials are optional.
    command: >
      --js --store_dir /data/jetstream
      --user ${NATS_USER:-nats} --pass ${NATS_PASSWORD:-nats}
    volumes:
      - nats_data:/data
    restart: unless-stopped

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  ollama_data:
  nats_data:
  redis_data:
